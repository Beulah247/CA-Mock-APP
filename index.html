<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Inter AI Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Georgia', serif; background: #0f172a; margin: 0; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; background: #1e293b; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #334155; }
        header { background: #020617; color: #fbbf24; padding: 30px; text-align: left; border-bottom: 4px solid #fbbf24; display: flex; align-items: center; gap: 20px; }
        .content { padding: 30px; }
        .config-box { background: #0f172a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fbbf24; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid #475569; background: #020617; color: #fbbf24; font-family: monospace; box-sizing: border-box; }
        select, button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-gold { background: #fbbf24; color: #020617; width: 100%; margin-top: 15px; }
        .mcq-box { margin-bottom: 20px; padding: 20px; background: #334155; border-radius: 8px; transition: 0.3s; }
        .option { padding: 12px; border: 1px solid #475569; border-radius: 5px; margin-top: 8px; cursor: pointer; background: #1e293b; }
        .option:hover { border-color: #fbbf24; }
        .correct { background: #14532d !important; border-color: #22c55e !important; }
        .wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
        .score-card { background: #fbbf24; color: #020617; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [jsonInput, setJsonInput] = React.useState("");
            const [paper, setPaper] = React.useState(null);
            const [view, setView] = React.useState("setup");
            const [userAnswers, setUserAnswers] = React.useState({});
            const [difficulty, setDifficulty] = React.useState("Medium");

            const loadPaper = () => {
                try {
                    const parsed = JSON.parse(jsonInput);
                    setPaper(parsed);
                    setView("exam");
                } catch (e) { alert("Invalid JSON format!"); }
            };

            const handleMCQ = (qIdx, choice) => {
                setUserAnswers({...userAnswers, [qIdx]: choice});
            };

            const calculateScore = () => {
                let score = 0;
                paper.mcqs.forEach((q, i) => {
                    if(userAnswers[i] === q.correctAnswer) score++;
                });
                return score;
            };

            return (
                <div className="container">
                    <header>
                        <div style={{fontSize: '40px'}}>₹</div>
                        <div>
                            <h1>CA INTER EXAM SYSTEM</h1>
                            <p style={{margin:0, opacity: 0.7}}>AI-POWERED SELF ASSESSMENT</p>
                        </div>
                    </header>
                    <div className="content">
                        {view === "setup" ? (
                            <div className="config-box">
                                <h3 style={{color:'#fbbf24'}}>PAPER CONFIGURATION</h3>
                                <div style={{display:'flex', gap:'10px', marginBottom:'15px'}}>
                                    <div style={{flex:1}}>
                                        <label>DIFFICULTY</label>
                                        <select style={{width:'100%', marginTop:'5px'}} value={difficulty} onChange={(e)=>setDifficulty(e.target.value)}>
                                            <option>Easy</option><option>Medium</option><option>Hard</option>
                                        </select>
                                    </div>
                                </div>
                                <label>PASTE DATA FROM AI</label>
                                <textarea value={jsonInput} onChange={(e) => setJsonInput(e.target.value)} placeholder="Paste JSON here..." />
                                <button className="btn-gold" onClick={loadPaper}>GENERATE PAPER</button>
                            </div>
                        ) : (
                            <div>
                                <div className="score-card">
                                    SCORE: {calculateScore()} / {paper.mcqs.length} (MCQs) | Difficulty: {difficulty}
                                </div>
                                <h3>SECTION A: LIVE GRADING MCQs</h3>
                                {paper.mcqs.map((q, i) => (
                                    <div key={i} className="mcq-box">
                                        <p><b>Q{i+1}.</b> {q.question}</p>
                                        {Object.entries(q.options).map(([key, val]) => {
                                            const isSelected = userAnswers[i] === key;
                                            const isCorrect = key === q.correctAnswer;
                                            let statusClass = "";
                                            if(userAnswers[i]) {
                                                if(isCorrect) statusClass = "correct";
                                                else if(isSelected) statusClass = "wrong";
                                            }
                                            return (
                                                <div key={key} className={`option ${statusClass}`} onClick={() => !userAnswers[i] && handleMCQ(i, key)}>
                                                    <b>{key}.</b> {val}
                                                </div>
                                            );
                                        })}
                                        {userAnswers[i] && <p style={{marginTop: '10px', fontSize:'14px', color:'#fbbf24'}}><b>Note:</b> {q.explanation}</p>}
                                    </div>
                                ))}
                                <button style={{background:'#475569', color:'white'}} onClick={() => setView("setup")}>RESET PORTAL</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
